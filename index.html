
<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Trading Terminal</title>
</head>
<body style="margin:0; background:#000;">

    <div class="tradingview-widget-container" style="height:100vh; width:100%;">
        <div id="tradingview_chart" style="height:100%; width:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT", // Default symbol
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "allow_symbol_change": true, // Yeh option aapko symbol search karne ki azadi dega
            "container_id": "tradingview_chart"
        });
        </script>
    </div>

</body>
</html>
